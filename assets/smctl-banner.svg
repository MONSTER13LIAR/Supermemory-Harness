<svg xmlns="http://www.w3.org/2000/svg" width="717" height="314" viewBox="0 0 717 314" role="img" aria-labelledby="title desc">
  <title id="title">Supermemory Harness smctl terminal banner</title>
  <desc id="desc">A clean black terminal banner showing the blue smctl ASCII mark, Supermemory Harness, and install.</desc>
  <defs>
    <filter id="ansiGlow" x="-10%" y="-22%" width="120%" height="150%">
      <feGaussianBlur stdDeviation="0.75" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .mono {
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
      }
      .ascii {
        font-size: 29px;
        font-weight: 700;
        letter-spacing: 0;
      }
    </style>
  </defs>
  <rect width="717" height="314" fill="#000000"/>
  <g class="mono ascii" filter="url(#ansiGlow)">
    <text x="58" y="71" fill="#005fff" xml:space="preserve">  ___ _ __ ___   ___| |_| |</text>
    <text x="58" y="115" fill="#0087ff" xml:space="preserve"> / __| '_ ` _ \ / __| __| |</text>
    <text x="58" y="159" fill="#00d7ff" xml:space="preserve"> \__ \ | | | | | (__| |_| |</text>
    <text x="58" y="203" fill="#0087ff" xml:space="preserve"> |___/_| |_| |_|\___|\__|_|</text>
  </g>
  <text x="59" y="246" fill="#00d7ff" font-size="31" font-weight="800" class="mono">Supermemory Harness</text>
  <text x="59" y="285" fill="#005f87" font-size="28" font-weight="700" class="mono">install</text>
</svg>
